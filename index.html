  .a4-container {

    align-items: center;
    gap: 30px;
  }
  .a4-page {
    width: 210mm;

    padding: 15mm 12mm;
    box-sizing: border-box;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);

    position: relative;
    line-height: 1.5;
  }
  
  /* 針對列印時的特殊設定 */

    @page { size: A4 portrait; margin: 0; }
    body, html { background: white; margin: 0; padding: 0; }
    
    /* 隱藏不需要列印的後台 UI */
    .no-print { display: none !important; }
    
    /* 移除捲動與背景設定，確保能完整印出多頁 */
    #root > div { display: block !important; }
    #root > div > div:last-child { display: block !important; padding: 0 !important; overflow: visible !important; }
    
    .a4-container { gap: 0; display: block; }
    .a4-page { 
      box-shadow: none; 
      page-break-after: always; /* 確保每一張 A4 獨立一頁 */

    }
  }

  const variants = {
    default: "bg-transparent border-[#2e2e2e] text-[#ccc] hover:border-[#444] hover:text-white",
    primary: "bg-[#4ade80] border-[#4ade80] text-[#0f0f0f] hover:bg-[#22c55e]",
    danger: "bg-transparent border-[#ef4444]/50 text-[#ef4444] hover:bg-[#ef4444]/10",
    ghost: "bg-transparent border-transparent text-[#888] hover:text-[#ccc]"
  };
  const sizes = {sm: "px-3 py-1.5 text-xs", md: "px-4 py-2 text-sm", lg: "px-5 py-2.5 text-base"};
  return <button onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>{children}</button>;
};

              <div style={{ fontWeight: 'bold' }}>聯絡我們 - {data.office.name}</div>
              電話：{data.office.phone}<br/>
              地址：{data.office.address}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

function App() {
  const [data, setData] = useState(null); // 改為 null 等待連線
  const [activeSection, setActiveSection] = useState('basic');
  const [groupTab, setGroupTab] = useState('weekday');
  const [toast, setToast] = useState(null);
  const [isSaving, setIsSaving] = useState(false);
  const [isConnected, setIsConnected] = useState(false);

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(null), 3000); };

  // 3. 監聽 Firebase 雲端資料 (與 index.html 通訊關鍵)
  useEffect(() => {
    const bulletinRef = db.ref('bulletin_data');
    bulletinRef.on('value', (snapshot) => {
      const cloudData = snapshot.val();
      if (cloudData) {
        setData(cloudData);
        setIsConnected(true);
      } else {
        setData(DEFAULT_DATA);
        setIsConnected(true);
      }
    });
    return () => bulletinRef.off();
  }, []);

  // 4. 儲存至雲端 Firebase
  const save = async () => {
    setIsSaving(true);
    db.ref('bulletin_data').set(data)
      .then(() => {
        showToast('🚀 儲存成功！手機版已即時更新');
      })
      .catch((err) => {
        showToast('❌ 儲存失敗：' + err.message);
      })
      .finally(() => {
        setIsSaving(false);
      });
  };

  // 更新邏輯
  const update = (path, value) => {
    setData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const keys = path.split('.');
      let obj = next;
      for (let i=0; i<keys.length-1; i++) obj = obj[keys[i]];
      obj[keys[keys.length-1]] = value;
      return next;
    });
  };

  // 自動換算日期
  const calculateWeekNumber = () => {
    const d = new Date(data.bulletinDate);
    if (isNaN(d.getTime())) return showToast('日期格式錯誤');
    const day = d.getDate();
    const weekIdx = Math.ceil(day / 7);
    const chineseWeeks = ["第一週", "第二週", "第三週", "第四週", "第五週"];
    update('weekNumber', chineseWeeks[weekIdx-1] || "第一週");
    showToast(`自動設定為 ${chineseWeeks[weekIdx-1]}`);
  };

  // 通用移動功能
  const moveItem = (path, from, to) => {
    setData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const keys = path.split('.');
      let list = next;
      for (let k of keys) list = list[k];
      const item = list.splice(from, 1)[0];
      list.splice(to, 0, item);
      return next;
    });
  };

  const navItems = [
    {id:'basic',label:'基本資訊'}, 
    {id:'theme',label:'主題信息'}, 
    {id:'sermon',label:'信息大綱'},
    {id:'songs',label:'敬拜詩歌'}, 
    {id:'schedule',label:'聚會流程'}, 
    {id:'announcements',label:'教會公告'},
    {id:'groups',label:'小組資訊'},
    {id:'contact',label:'聯絡奉獻'},
    {id:'preview',label:'📄 預覽與列印'}
  ];

  const renderSection = () => {
    if (!data) return <div style={{padding:'20px'}}>連線中...</div>;
    
    switch(activeSection) {
      case 'basic': return (
        <Card>
          <SectionTitle>基本資訊</SectionTitle>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', alignItems:'end'}}>
            <Field label="週報日期"><input type="date" value={data.bulletinDate} onChange={e=>update('bulletinDate', e.target.value)}/></Field>
            <div style={{display:'flex', gap:'8px', marginBottom:'14px'}}>
              <div style={{flex:1}}><label>第幾週</label><input value={data.weekNumber} onChange={e=>update('weekNumber', e.target.value)}/></div>
              <Btn onClick={calculateWeekNumber} style={{height:'42px'}}>自動換算</Btn>
            </div>
          </div>
          <Field label="年度異象"><input value={data.vision} onChange={e=>update('vision', e.target.value)}/></Field>
        </Card>
      );

      case 'sermon': return (
        <div>
          <div style={{display:'flex', justifyContent:'space-between', marginBottom:'10px'}}>
            <span style={{color:'#666', fontSize:'12px'}}>段落 1.2.3 可排序</span>
            <Btn size="sm" variant="primary" onClick={()=>{
              const n = [...data.sermonOutline, {title:'', content:[]}];
              update('sermonOutline', n);
            }}>+ 新增段落</Btn>
          </div>
          {data.sermonOutline.map((item, idx)=>(
            <Card key={idx}>
              <div style={{display:'flex', justifyContent:'space-between', marginBottom:'10px'}}>
                <div style={{display:'flex', alignItems:'center'}}>
                  <span style={{color:'#4ade80', fontWeight:'bold', marginRight:'10px'}}>段落 {idx+1}</span>
                  <SortControls isFirst={idx===0} isLast={idx===data.sermonOutline.length-1} onMoveUp={()=>moveItem('sermonOutline', idx, idx-1)} onMoveDown={()=>moveItem('sermonOutline', idx, idx+1)} />
                </div>
                <Btn size="sm" variant="danger" onClick={()=>{
                  const n = data.sermonOutline.filter((_,i)=>i!==idx);
                  update('sermonOutline', n);
                }}>刪除</Btn>
              </div>
              <Field label="段落標題"><input value={item.title} onChange={e=>{
                const n = [...data.sermonOutline]; n[idx].title = e.target.value; update('sermonOutline', n);
              }}/></Field>
              <label>內容要點排序</label>
              {item.content.map((c, ci)=>(
                <div key={ci} style={{display:'flex', gap:'8px', marginBottom:'6px', alignItems:'center'}}>
                  <div style={{fontSize:'12px', color:'#4ade80', width:'20px'}}>{ci+1}.</div>
                  <textarea value={c} style={{flex:1}} onChange={e=>{
                    const n = [...data.sermonOutline]; n[idx].content[ci] = e.target.value; update('sermonOutline', n);
                  }}/>
                  <SortControls isFirst={ci===0} isLast={ci===item.content.length-1} onMoveUp={()=>moveItem(`sermonOutline.${idx}.content`, ci, ci-1)} onMoveDown={()=>moveItem(`sermonOutline.${idx}.content`, ci, ci+1)} />
                  <Btn size="sm" variant="danger" onClick={()=>{
                    const n = [...data.sermonOutline]; n[idx].content.splice(ci,1); update('sermonOutline', n);
                  }}>✕</Btn>
                </div>
              ))}
              <Btn size="sm" onClick={()=>{
                const n = [...data.sermonOutline]; n[idx].content.push(''); update('sermonOutline', n);
              }}>+ 新增要點</Btn>
            </Card>
          ))}
        </div>
      );

      case 'songs': return (
        <Card>
          <SectionTitle>敬拜詩歌 (順序 1.2. 排列)</SectionTitle>
          {['worship', 'response'].map(type => (
            <div key={type} style={{marginBottom:'20px'}}>
              <label>{type === 'worship' ? '1. 敬拜歌曲' : '2. 回應詩歌'}</label>
              {data.songs[type].map((s, i)=>(
                <div key={i} className="list-item-row">
                  <span style={{color:'#4ade80', marginRight:'10px', fontWeight:'bold'}}>{i+1}.</span>
                  <input value={s} style={{flex:1}} onChange={e=>{
                    const n = [...data.songs[type]]; n[i] = e.target.value; update(`songs.${type}`, n);
                  }}/>
                  <SortControls isFirst={i===0} isLast={i===data.songs[type].length-1} onMoveUp={()=>moveItem(`songs.${type}`, i, i-1)} onMoveDown={()=>moveItem(`songs.${type}`, i, i+1)} />
                  <Btn size="sm" variant="danger" style={{marginLeft:'8px'}} onClick={()=>{
                    const n = data.songs[type].filter((_,idx)=>idx!==i); update(`songs.${type}`, n);
                  }}>✕</Btn>
                </div>
              ))}
              <Btn size="sm" variant="primary" onClick={()=>{
                const n = [...data.songs[type], '']; update(`songs.${type}`, n);
              }}>+ 新增詩歌</Btn>
            </div>
          ))}
        </Card>
      );

      case 'schedule': return (
        <Card>
          <SectionTitle>聚會流程排序</SectionTitle>
          {data.schedule.map((item, idx)=>(
            <div key={idx} className="list-item-row" style={{display:'grid', gridTemplateColumns:'30px 100px 100px 1fr auto', gap:'8px'}}>
              <div style={{color:'#4ade80', fontWeight:'bold'}}>{idx+1}</div>
              <input type="time" value={item.start} onChange={e=>{
                const n = [...data.schedule]; n[idx].start = e.target.value; update('schedule', n);
              }}/>
              <input type="time" value={item.end} onChange={e=>{
                const n = [...data.schedule]; n[idx].end = e.target.value; update('schedule', n);
              }}/>
              <input value={item.task} onChange={e=>{
                const n = [...data.schedule]; n[idx].task = e.target.value; update('schedule', n);
              }}/>
              <div style={{display:'flex', alignItems:'center'}}>
                <SortControls isFirst={idx===0} isLast={idx===data.schedule.length-1} onMoveUp={()=>moveItem('schedule', idx, idx-1)} onMoveDown={()=>moveItem('schedule', idx, idx+1)} />
                <Btn size="sm" variant="danger" style={{marginLeft:'8px'}} onClick={()=>{
                   const n = data.schedule.filter((_,i)=>i!==idx); update('schedule', n);
                }}>✕</Btn>
              </div>
            </div>
          ))}
          <Btn size="sm" variant="primary" onClick={()=>{
            const n = [...data.schedule, {start:'', end:'', task:''}]; update('schedule', n);
          }}>+ 新增流程</Btn>
        </Card>
      );

      case 'groups': {
        // 1. 安全獲取當前列表，加入 || [] 避免 Firebase 刪除空節點導致 undefined 崩潰
        const currentList = groupTab === 'overseas' ? (data.overseas || []) : (data.groups?.[groupTab] || []);
        const currentPath = groupTab === 'overseas' ? 'overseas' : `groups.${groupTab}`;

        return (
          <div>
            <div style={{background:'#0a0a0a', padding:'4px', borderRadius:'8px', display:'flex', gap:'4px', marginBottom:'16px', border:'1px solid #222'}}>
              {['weekday','sunday','special','overseas'].map(t => (
                <button key={t} onClick={()=>setGroupTab(t)} style={{
                  flex:1, padding:'8px', border:'none', borderRadius:'6px', cursor:'pointer',
                  background: groupTab===t ? '#1e1e1e' : 'transparent',
                  color: groupTab===t ? '#4ade80' : '#666', fontSize:'13px'
                }}>{t==='weekday'?'平日':t==='sunday'?'主日':t==='special'?'特色':'海外'}</button>
              ))}
            </div>
            <div style={{display:'flex', justifyContent:'flex-end', marginBottom:'10px'}}>
              <Btn size="sm" variant="primary" onClick={()=>{
                const newItem = groupTab === 'overseas' 
                  ? {name:'', leader:'', time:'', loc:'', flag:'🇬🇧'} 
                  : {name:'', time:'', leader:'', loc:''};
                update(currentPath, [...currentList, newItem]);
              }}>+ 新增</Btn>
            </div>
            {currentList.map((g, idx)=>(
              <Card key={idx}>
                <div style={{display:'flex', justifyContent:'space-between', marginBottom:'10px'}}>
                  <div style={{display:'flex', alignItems:'center'}}>
                    <span style={{fontSize:'12px', color:'#888', marginRight:'10px'}}># {idx+1} 排序</span>
                    <SortControls 
                      isFirst={idx===0} 
                      isLast={idx===currentList.length-1} 
                      onMoveUp={()=>moveItem(currentPath, idx, idx-1)} 
                      onMoveDown={()=>moveItem(currentPath, idx, idx+1)} 
                    />
                  </div>
                  <Btn size="sm" variant="danger" onClick={()=>{
                    const newList = currentList.filter((_,i)=>i!==idx);
                    update(currentPath, newList);
                  }}>刪除</Btn>
                </div>
                
                {/* 2. 簡化 onChange 寫法，不再手動跑迴圈，直接使用展開運算子 */}
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px'}}>
                  <Field label="小組名稱"><input value={g.name || ''} onChange={e=>{
                     const newList = [...currentList];
                     newList[idx] = {...newList[idx], name: e.target.value};
                     update(currentPath, newList);
                  }}/></Field>
                  <Field label="帶領人 / 牧師"><input value={g.leader || ''} onChange={e=>{
                     const newList = [...currentList];
                     newList[idx] = {...newList[idx], leader: e.target.value};
                     update(currentPath, newList);
                  }}/></Field>
                  <Field label="時間"><input value={g.time || ''} onChange={e=>{
                     const newList = [...currentList];
                     newList[idx] = {...newList[idx], time: e.target.value};
                     update(currentPath, newList);
                  }}/></Field>
                  <Field label="地點"><input value={g.loc || ''} onChange={e=>{
                     const newList = [...currentList];
                     newList[idx] = {...newList[idx], loc: e.target.value};
                     update(currentPath, newList);
                  }}/></Field>
                  
                  {/* 3. 如果是海外小組，額外顯示國旗 Emoji 編輯欄位 */}
                  {groupTab === 'overseas' && (
                    <Field label="國旗 (Emoji)"><input value={g.flag || ''} placeholder="例如: 🇬🇧" onChange={e=>{
                       const newList = [...currentList];
                       newList[idx] = {...newList[idx], flag: e.target.value};
                       update(currentPath, newList);
                    }}/></Field>
                  )}
                </div>
              </Card>
            ))}
          </div>
        );
      }   

      case 'announcements': return (
        <div>
          <div style={{display:'flex', justifyContent:'flex-end', marginBottom:'10px'}}>
            <Btn size="sm" variant="primary" onClick={()=>{
              const n = [...data.announcements, {id: Date.now(), title:'', date:'', detail:''}];
              update('announcements', n);
            }}>+ 新增公告</Btn>
          </div>
          {data.announcements.map((a, idx)=>(
            <Card key={a.id}>
              <div style={{display:'flex', justifyContent:'space-between', marginBottom:'10px'}}>
                <div style={{display:'flex', alignItems:'center'}}>
                  <span style={{fontSize:'12px', color:'#888', marginRight:'10px'}}>公告順序 # {idx+1}</span>
                  <SortControls isFirst={idx===0} isLast={idx===data.announcements.length-1} onMoveUp={()=>moveItem('announcements', idx, idx-1)} onMoveDown={()=>moveItem('announcements', idx, idx+1)} />
                </div>
                <Btn size="sm" variant="danger" onClick={()=>{
                  const n = data.announcements.filter((_,i)=>i!==idx);
                  update('announcements', n);
                }}>刪除</Btn>
              </div>
              <div style={{display:'grid', gridTemplateColumns:'120px 1fr', gap:'12px'}}>
                <Field label="日期標籤"><input value={a.date} onChange={e=>{
                  const n = [...data.announcements]; n[idx].date = e.target.value; update('announcements', n);
                }}/></Field>
                <Field label="標題"><input value={a.title} onChange={e=>{
                  const n = [...data.announcements]; n[idx].title = e.target.value; update('announcements', n);
                }}/></Field>
              </div>
              <Field label="詳細內容"><textarea value={a.detail} onChange={e=>{
                 const n = [...data.announcements]; n[idx].detail = e.target.value; update('announcements', n);
              }}/></Field>
            </Card>
          ))}
        </div>
      );

      case 'theme': return (
        <Card>
          <SectionTitle>信息主題</SectionTitle>
          <Field label="標題"><input value={data.theme.title} onChange={e=>update('theme.title', e.target.value)}/></Field>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px'}}>
            <Field label="講員"><input value={data.theme.speaker} onChange={e=>update('theme.speaker', e.target.value)}/></Field>
            <Field label="司會"><input value={data.theme.moderator} onChange={e=>update('theme.moderator', e.target.value)}/></Field>
          </div>
          <Field label="本週經文"><textarea value={data.theme.scripture} onChange={e=>update('theme.scripture', e.target.value)}/></Field>
        </Card>
      );

      case 'contact': return (
        <div>
          <Card><SectionTitle>奉獻資訊</SectionTitle>
            <Field label="戶名"><input value={data.offering.name} onChange={e=>update('offering.name', e.target.value)}/></Field>
            <Field label="銀行"><input value={data.offering.bank} onChange={e=>update('offering.bank', e.target.value)}/></Field>
            <Field label="帳號"><input value={data.offering.account} onChange={e=>update('offering.account', e.target.value)}/></Field>
          </Card>
          <Card><SectionTitle>辦公室</SectionTitle>
            <Field label="電話"><input value={data.office.phone} onChange={e=>update('office.phone', e.target.value)}/></Field>
            <Field label="地址"><input value={data.office.address} onChange={e=>update('office.address', e.target.value)}/></Field>
          </Card>
        </div>
      );
      
      case 'preview': return (
        <div>
           <div className="no-print" style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '20px', alignItems: 'center' }}>
             <span style={{ color: '#aaa' }}>💡 提示：請確保瀏覽器列印設定中，紙張大小為 A4、無邊界 (或預設邊界)。</span>
             <Btn variant="primary" onClick={() => window.print()}>🖨️ 一鍵列印 PDF</Btn>
           </div>
           <BulletinPreview data={data} />
        </div>
      );

      default: return null;
    }
  };

  return (
    <div style={{display:'flex', flexDirection:'column', minHeight:'100vh'}}>
      <div className="no-print" style={{background:'#111', borderBottom:'1px solid #1e1e1e', padding:'14px 24px', display:'flex', alignItems:'center', justifyContent:'space-between', position:'sticky', top:0, zIndex:100}}>
        <div style={{display:'flex', alignItems:'center', gap:'12px'}}>
          <div style={{width:'32px', height:'32px', background:'#4ade80', borderRadius:'8px', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'16px', color:'#000'}}>✦</div>
          <div style={{display:'flex', flexDirection:'column'}}>
            <div style={{fontSize:'16px', fontWeight:'700'}}>風一族週報後台 v2.2</div>
            <div style={{fontSize:'11px', color: isConnected ? '#4ade80' : '#888'}}>
                {isConnected ? '● 已連線雲端' : '○ 載入中...'}
            </div>
          </div>
        </div>
        <Btn variant="primary" onClick={save} disabled={isSaving || !isConnected}>
            {isSaving ? '儲存中...' : '儲存至雲端'}
        </Btn>
      </div>

      <div style={{display:'flex', flex:1}}>
        <div className="no-print" style={{width:'180px', background:'#0d0d0d', borderRight:'1px solid #1a1a1a', padding:'16px 12px'}}>
          {navItems.map(item=>(
            <button key={item.id} onClick={()=>setActiveSection(item.id)} style={{
              width:'100%', textAlign:'left', padding:'10px 12px', borderRadius:'7px', border:'none',
              background: activeSection===item.id ? '#1e1e1e' : 'transparent',
              color: activeSection===item.id ? '#4ade80' : '#888',
              fontSize:'13px', cursor:'pointer', marginBottom:'4px', display:'block'
            }}>{item.label}</button>
          ))}
          <div style={{marginTop:'30px', padding:'10px', borderTop:'1px solid #222'}}>
             <Btn size="sm" style={{width:'100%'}} onClick={()=>navigator.clipboard.writeText(JSON.stringify(data)).then(()=>showToast('JSON 已複製'))}>複製全域資料</Btn>
          </div>
        </div>
        <div style={{flex:1, padding:'30px', overflowY:'auto', background:'#0f0f0f'}}>
          <div style={{maxWidth:'800px', margin:'0 auto'}}>{renderSection()}</div>
        </div>
      </div>
      {toast && <div style={{position:'fixed', bottom:'20px', right:'20px', background:'#0f2d1a', border:'1px solid #4ade80', color:'#4ade80', padding:'10px 20px', borderRadius:'8px', zIndex:1000, boxShadow:'0 4px 12px rgba(0,0,0,0.5)'}}>{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
