<script src="https://www.gstatic.com/firebasejs/9.16.0/firebase-database-compat.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans TC',sans-serif;background:#0f0f0f;color:#e8e8e8;min-height:100vh}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#1a1a1a}
  ::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
  input,textarea,select{
    width:100%;padding:10px 12px;background:#1e1e1e;border:1px solid #2e2e2e;
    border-radius:6px;color:#e8e8e8;font-size:14px;outline:none;transition:border-color .2s;
  }
  input:focus,textarea:focus,select:focus{border-color:#4ade80}
  textarea{resize:vertical;min-height:60px;line-height:1.6}
  button{cursor:pointer;font-family:'Noto Sans TC',sans-serif}
  label{font-size:12px;color:#888;font-weight:500;letter-spacing:.05em;display:block;margin-bottom:5px}
  
  .sort-controls { display: flex; gap: 4px; margin-left: 8px; }
  .sort-btn { background: #262626; border: 1px solid #333; color: #888; padding: 4px 8px; border-radius: 4px; font-size: 10px; transition: all 0.2s; }
  .sort-btn:hover { background: #333; color: #4ade80; border-color: #4ade80; }
  .sort-btn:disabled { opacity: 0.2; cursor: not-allowed; }
  
  .list-item-row { display: flex; align-items: center; background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #222; }
  .word-count { font-size: 11px; float: right; margin-top: -20px; }
  .word-count.warning { color: #ef4444; font-weight: bold; }

  /* ================= 側邊欄固定樣式 ================= */
  .sidebar-fixed {
    width: 180px; 
    background: #0d0d0d; 
    border-right: 1px solid #1a1a1a; 
    padding: 16px 12px;
    position: sticky;
    top: 61px; /* 貼齊 Header 底部 */
    height: calc(100vh - 61px);
    overflow-y: auto;
  }

  /* ================= A4 預覽與列印樣式 ================= */
  .a4-container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .a4-page {
    width: 210mm;
    height: 295mm;
    overflow: hidden; 
    background: white;
    color: #333;
    padding: 8mm 10mm; 
    box-sizing: border-box;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    font-family: 'Noto Sans TC', sans-serif;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  
  @media print {
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
    @page { size: A4 portrait; margin: 0; }
    body, html { background: white; margin: 0; padding: 0; }
    .no-print { display: none !important; }
    #root > div { display: block !important; }
    #root > div > div:last-child { display: block !important; padding: 0 !important; overflow: visible !important; }
    .a4-container { gap: 0; display: block; }
    .a4-page { 
      box-shadow: none; 
      page-break-after: always; 
      page-break-inside: avoid; 
      border: none; 
      height: 295mm; 
    }
  }

  :root {
    --brand-blue: #003B91;
    --card-bg: #f5f8fc;
    --border-color: #dce4ec;
  }

  /* Header & 主題 */
  .pdf-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--brand-blue); padding-bottom: 12px; margin-bottom: 10px; flex-shrink: 0; }
  .pdf-logo-area { display: flex; align-items: center; gap: 10px; }
  .pdf-logo-text { color: var(--brand-blue); font-weight: 700; font-size: 26px; letter-spacing: 1px; }
  
  .pdf-vision { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 15px; }
  .pdf-vision-title { font-size: 11px; color: #888; letter-spacing: 1.5px; margin-bottom: 4px; }
  .pdf-vision-text { font-size: 18px; font-weight: 700; color: var(--brand-blue); letter-spacing: 1px; }
  
  .pdf-date-box { background: white; color: var(--brand-blue); border-radius: 6px; padding: 4px 12px; text-align: center; border: 2px solid var(--brand-blue); }
  .pdf-date-week { font-size: 14px; font-weight: bold; background: var(--brand-blue); color: white; padding: 2px 8px; border-radius: 4px; margin-bottom: 4px;}
  .pdf-date-num { font-size: 18px; font-weight: 700; }

  .pdf-theme-box { border: 1px solid var(--border-color); border-radius: 8px; padding: 10px 15px; margin-bottom: 12px; background: white; flex-shrink: 0; }
  .pdf-theme-top { display: flex; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 6px; margin-bottom: 6px; }
  .pdf-theme-badge { background: var(--brand-blue); color: white; padding: 3px 10px; border-radius: 4px; font-weight: bold; font-size: 14px; margin-right: 15px; }
  .pdf-theme-title { font-size: 18px; font-weight: 700; color: var(--brand-blue); flex: 1; }
  .pdf-theme-speakers { font-size: 14px; font-weight: bold; color: #333; }
  .pdf-theme-speakers span { color: var(--brand-blue); margin: 0 6px; }
  .pdf-theme-bottom { display: flex; font-size: 13px; color: #555; line-height: 1.4; }
  .pdf-theme-bottom-label { font-weight: bold; color: #333; margin-right: 8px; white-space: nowrap; border-right: 1px solid #ccc; padding-right: 8px; }

  /* 第一頁 嚴格雙欄高度佈局 */
  .pdf-content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; flex-grow: 1; min-height: 0; }
  .pdf-col { display: grid; gap: 12px; height: 100%; min-height: 0; } 
  
  /* 卡片元件 */
  .pdf-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px 14px; overflow: hidden; display: flex; flex-direction: column;}
  .pdf-card-title { color: var(--brand-blue); font-weight: bold; font-size: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; border-bottom: 2px solid var(--border-color); padding-bottom: 6px; flex-shrink: 0;}
  
  /* 統一文字格式 (大綱與消息) */
  .content-heading { font-weight: 700; font-size: 14px; color: var(--brand-blue); margin-bottom: 4px; margin-top: 8px;}
  .content-heading:first-child { margin-top: 0; }
  .outline-text { font-size: 13.5px; margin-left: 4px; margin-bottom: 4px; white-space: pre-wrap; color: #222; line-height: 1.5; display: block; }
  .custom-list { padding-left: 16px; font-size: 13.5px; margin-bottom: 8px; color: #222; line-height: 1.5; }
  .custom-list li { margin-bottom: 4px; }
  
  /* 表格與詩歌元件 */
  .clean-schedule-table { width: 100%; border-collapse: collapse; font-size: 13.5px; color: #222; line-height: 1.5;}
  .clean-schedule-table td { padding: 4px 0; vertical-align: top; }
  .song-category-title { font-size: 13.5px; font-weight: bold; color: var(--brand-blue); margin: 6px 0 4px 0; }

  /* 第二頁排版 */
  .pdf-table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
  .pdf-table th { background: var(--brand-blue); color: white; padding: 6px 4px; border: 1px solid white; font-weight: bold; text-align: center;}
  .pdf-table td { background: white; border: 1px solid var(--border-color); padding: 6px 4px; color: #222; }
  .pdf-table tr:nth-child(even) td { background: #fbfbfc; }

  .pdf-page-2-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
  .pdf-page-2-special-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 15px; }

  /* 深藍底 Footer */
  .pdf-dark-footer { background: var(--brand-blue); color: white; padding: 15px 20px; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: auto; }
  .pdf-dark-title { font-size: 14px; font-weight: bold; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .pdf-dark-text { font-size: 12px; color: #cbd5e1; line-height: 1.5; }
</style>
</head>

<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;

const firebaseConfig = {

const Btn = ({onClick, children, variant='default', size='md', className='', disabled=false, style={}}) => {
  const base = "inline-flex items-center gap-2 rounded-lg font-medium transition-all duration-150 border";
  const variants = {
    default: "bg-transparent border-[#2e2e2e] text-[#ccc] hover:border-[#444] hover:text-white",
    primary: "bg-[#4ade80] border-[#4ade80] text-[#0f0f0f] hover:bg-[#22c55e]",
    danger: "bg-transparent border-[#ef4444]/50 text-[#ef4444] hover:bg-[#ef4444]/10",
    ghost: "bg-transparent border-transparent text-[#888] hover:text-[#ccc]"
  };
  const sizes = {sm: "px-3 py-1.5 text-xs", md: "px-4 py-2 text-sm", lg: "px-5 py-2.5 text-base"};
  return <button onClick={onClick} disabled={disabled} style={style} className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>{children}</button>;
};

const SortControls = ({onMoveUp, onMoveDown, isFirst, isLast}) => (
  <div className="sort-controls">
    <button className="sort-btn" onClick={onMoveUp} disabled={isFirst} title="上移">▲</button>
    <button className="sort-btn" onClick={onMoveDown} disabled={isLast} title="下移">▼</button>
  </div>
);

const Card = ({children}) => <div style={{background:'#161616',border:'1px solid #222',borderRadius:'10px',padding:'20px',marginBottom:'16px'}}>{children}</div>;
const SectionTitle = ({children}) => <h3 style={{fontSize:'11px',fontWeight:'700',color:'#4ade80',letterSpacing:'.15em',textTransform:'uppercase',marginBottom:'16px'}}>{children}</h3>;
const Field = ({label, children}) => <div style={{marginBottom:'14px'}}><label>{label}</label>{children}</div>;

// ==========================================
// 預覽與列印版面元件
// ==========================================
const BulletinPreview = ({ data, outlineRef, announcementsRef }) => {
  const parts = data.bulletinDate.split('-');
  const year = parts[0] || '2026';
  const mmdd = parts.length === 3 ? `${parts[1]}/${parts[2]}` : '12/26';

  const isLongOutline = data.layout?.longOutline || false;
  const specialGroups = data.groups.special.filter(g => g.category === '特色' || !g.category);
  const readingGroups = data.groups.special.filter(g => g.category === '讀經');
  const outOfTownGroups = data.groups.special.filter(g => g.category === '外縣市');

  return (
    <div className="a4-container">
      {/* ──────────────── 第一頁 (正面) ──────────────── */}
      <div className="a4-page" id="page-1">
        <div className="pdf-header">
          <div className="pdf-logo-area">
            <img src="./2022logo (1).png" alt="logo" style={{width:'50px', height:'50px', objectFit:'contain'}} />

              <div className="pdf-logo-text">風一族職場教會</div>

            </div>
          </div>
          <div className="pdf-vision">
            <div className="pdf-vision-title">— {year} 年度異象 —</div>
            <div className="pdf-vision-text">{data.vision}</div>
          </div>
          <div className="pdf-date-box">
            <div className="pdf-date-week">{data.weekNumber}</div>
            <div className="pdf-date-num">{year}<br/>{mmdd}</div>
          </div>
        </div>

        <div className="pdf-theme-box">
          <div className="pdf-theme-top">
            <div className="pdf-theme-badge">主題</div>
            <div className="pdf-theme-title">{data.theme.title}</div>
            <div className="pdf-theme-speakers">
              講員 <span>|</span> {data.theme.speaker} &nbsp;&nbsp; 司會 <span>|</span> {data.theme.moderator}
            </div>
          </div>
          <div className="pdf-theme-bottom">
            <div className="pdf-theme-bottom-label">經文</div>
            <div>{data.theme.scripture}</div>
          </div>
        </div>

        <div className="pdf-content-grid">
          {/* 左欄 */}
          <div className="pdf-col" style={{ gridTemplateRows: isLongOutline ? '1fr' : 'minmax(0, 1fr) 210px' }}>
            <div className="pdf-card">
              <div className="pdf-card-title">📖 信息大綱</div>
              <div ref={outlineRef} style={{overflow: 'hidden', flex: '1 1 0%', minHeight: 0}}>
                {data.sermonOutline.map((item, idx) => (
                  <div key={idx} style={{marginBottom: '8px'}}>
                    <div className="content-heading">{item.title}</div>
                    {item.content.map((c, ci) => (
                      <div key={ci} className="outline-text">{c}</div>
                    ))}
                  </div>
                ))}
              </div>
            </div>

            {!isLongOutline && (
              <div className="pdf-card">
                <div className="pdf-card-title">📅 聚會流程</div>
                <table className="clean-schedule-table">
                  <tbody>
                    {data.schedule.map((item, idx) => (
                      <tr key={idx}>
                        <td style={{ fontWeight:'bold', width: '90px' }}>{item.start}-{item.end}</td>
                        <td>{item.task}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {/* 右欄 */}

              <div className="pdf-card-title">🔔 教會消息</div>
              <div ref={announcementsRef} style={{overflow: 'hidden', flex: '1 1 0%', minHeight: 0}}>

                      {["一","二","三","四","五"][idx] || idx+1}、{a.title}
                    </div>
                    <ul className="custom-list">
                      {a.detail.split('\n').map((line, li) => <li key={li}>{line}</li>)}

            {isLongOutline ? (

      {/* ──────────────── 第二頁 (背面) ──────────────── */}
      <div className="a4-page" id="page-2" style={{ display: 'flex', flexDirection: 'column' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: '12px' }}>
          <div className="pdf-card-title" style={{ border: 'none', margin: 0, padding: 0, fontSize: '20px' }}>🔠 教會小組</div>

        <div className="pdf-page-2-grid">

        </div>

        <div className="pdf-page-2-special-grid">

            <div className="pdf-card-title" style={{ fontSize: '15px' }}>⭐ 特色團契 / 課程</div>
            {specialGroups.length > 0 ? specialGroups.map((g, i) => (
              <div key={i} style={{ marginBottom: '12px', fontSize: '13px', color: '#222', lineHeight: '1.5' }}>
                <div style={{ fontWeight: 'bold', color: 'var(--brand-blue)', fontSize: '14px' }}>{g.name}</div>
                <div>{g.time}</div>
                <div>{g.loc}</div>
                <div>負責：{g.leader}</div>
              </div>
            )) : <div style={{ fontSize: '13px', color: '#888', fontStyle: 'italic' }}>無資料</div>}
          </div>

          <div className="pdf-card" style={{ padding: '15px' }}>
            <div className="pdf-card-title" style={{ fontSize: '15px' }}>📖 讀經小組</div>
            {readingGroups.length > 0 ? readingGroups.map((g, i) => (
              <div key={i} style={{ marginBottom: '12px', fontSize: '13px', color: '#222', lineHeight: '1.5' }}>
                <div style={{ fontWeight: 'bold', color: 'var(--brand-blue)', fontSize: '14px' }}>{g.name}</div>
                <div>{g.time}</div>
                <div>{g.loc}</div>
                <div>組長：{g.leader}</div>
              </div>
            )) : <div style={{ fontSize: '13px', color: '#888', fontStyle: 'italic', textAlign: 'center', marginTop: '30px' }}>目前無資料</div>}
          </div>

          <div className="pdf-card" style={{ padding: '15px' }}>
            <div className="pdf-card-title" style={{ fontSize: '15px' }}>📍 外縣市小組</div>
            {outOfTownGroups.length > 0 ? outOfTownGroups.map((g, i) => (
              <div key={i} style={{ marginBottom: '12px', fontSize: '13px', color: '#222', lineHeight: '1.5' }}>
                <div style={{ fontWeight: 'bold', color: 'var(--brand-blue)', fontSize: '14px' }}>{g.name}</div>
                <div>{g.time}</div>
                <div>{g.loc}</div>
                <div>組長：{g.leader}</div>
              </div>
            )) : <div style={{ fontSize: '13px', color: '#888', fontStyle: 'italic', textAlign: 'center', marginTop: '30px' }}>目前無資料</div>}
          </div>
        </div>

        <div className="pdf-card" style={{ marginBottom: '20px' }}>
          <div className="pdf-card-title">🌍 海外分會</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px' }}>
            {data.overseas.map((o, i) => (
              <div key={i} style={{ fontSize: '13px', color: '#222', lineHeight: '1.6' }}>
                <div style={{ fontWeight: 'bold', color: 'var(--brand-blue)', fontSize: '14px', marginBottom: '4px' }}>{o.flag} {o.name}</div>
                <div>牧師：{o.leader}</div>
                <div>主日聚會：{o.time}</div>
                <div>聚會地點：{o.loc}</div>
              </div>
            ))}
          </div>
        </div>

        <div className="pdf-dark-footer">
          <div>
            <div className="pdf-dark-title">🎁 奉獻帳戶資訊</div>
            <div className="pdf-dark-text">
              戶名：{data.offering.name}<br/>
              帳號：{data.offering.bank} &nbsp; {data.offering.account}<br/>
              <span style={{ borderBottom: '1px solid #cbd5e1', marginTop: '4px', display: 'inline-block' }}>* 透過銀行轉帳奉獻後，請通知辦公室同工 *</span>
            </div>
          </div>
          <div>
            <div className="pdf-dark-title">📞 聯絡我們</div>
            <div className="pdf-dark-text">
              {data.office.name}<br/>
              電話：{data.office.phone}<br/>
              地址：{data.office.address}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

function App() {
  const [data, setData] = useState(null); 
  const [activeSection, setActiveSection] = useState('basic');
  const [groupTab, setGroupTab] = useState('weekday');
  const [toast, setToast] = useState(null);
  const [isSaving, setIsSaving] = useState(false);
  const [isConnected, setIsConnected] = useState(false);
  const [isExporting, setIsExporting] = useState(false);

  const outlineRef = useRef(null);
  const announcementsRef = useRef(null);
  const [isOverflowing, setIsOverflowing] = useState(false);

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(null), 3000); };

  useEffect(() => {
    const bulletinRef = db.ref('bulletin_data');
    bulletinRef.on('value', (snapshot) => {
      const cloudData = snapshot.val();
      if (cloudData) {
        if (!cloudData.layout) cloudData.layout = { longOutline: false };
        setData(cloudData);
        setIsConnected(true);
      } else {
        setData(DEFAULT_DATA);
        setIsConnected(true);
      }
    });
    return () => bulletinRef.off();
  }, []);

  useEffect(() => {
    if (activeSection !== 'preview') return;
    const checkOverflow = () => {
      let overflow = false;
      if (outlineRef.current && outlineRef.current.scrollHeight > Math.ceil(outlineRef.current.clientHeight) + 2) overflow = true;
      if (announcementsRef.current && announcementsRef.current.scrollHeight > Math.ceil(announcementsRef.current.clientHeight) + 2) overflow = true;
      setIsOverflowing(overflow);
    };
    checkOverflow();
    setTimeout(checkOverflow, 300);
  }, [data, activeSection]);

  const save = async () => {
    setIsSaving(true);
    db.ref('bulletin_data').set(data)
      .then(() => showToast('🚀 儲存成功！手機版已即時更新'))
      .catch((err) => showToast('❌ 儲存失敗：' + err.message))
      .finally(() => setIsSaving(false));
  };

  const update = (path, value) => {
    setData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const keys = path.split('.');
      let obj = next;
      for (let i=0; i<keys.length-1; i++) obj = obj[keys[i]];
      obj[keys[keys.length-1]] = value;
      return next;
    });
  };

  const calculateWeekNumber = () => {
    const d = new Date(data.bulletinDate);
    if (isNaN(d.getTime())) return showToast('日期格式錯誤');
    const day = d.getDate();
    const weekIdx = Math.ceil(day / 7);
    const chineseWeeks = ["第一週", "第二週", "第三週", "第四週", "第五週"];
    update('weekNumber', chineseWeeks[weekIdx-1] || "第一週");
    showToast(`自動設定為 ${chineseWeeks[weekIdx-1]}`);
  };

  const moveItem = (path, from, to) => {
    setData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const keys = path.split('.');
      let list = next;
      for (let k of keys) list = list[k];
      const item = list.splice(from, 1)[0];
      list.splice(to, 0, item);
      return next;
    });
  };

  // ================= 匯出與雲端發佈功能 =================
  const exportToImage = async (pageId, format) => {
    setIsExporting(true);
    showToast('影像產出中，請稍候...');
    try {
      const el = document.getElementById(pageId);
      const canvas = await html2canvas(el, { scale: 2, useCORS: true });
      const link = document.createElement('a');
      link.download = `風一族週報_${pageId}.${format}`;
      link.href = canvas.toDataURL(`image/${format}`);
      link.click();
    } catch (err) {
      showToast('匯出圖片失敗：' + err.message);
    }
    setIsExporting(false);
  };

  const exportToPDF = async (mode) => {
    setIsExporting(true);
    showToast('PDF 產出中，請稍候...');
    try {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');
      const p1 = document.getElementById('page-1');
      const p2 = document.getElementById('page-2');

      if (mode === 'page1' || mode === 'all') {
        const canvas1 = await html2canvas(p1, { scale: 2, useCORS: true });
        pdf.addImage(canvas1.toDataURL('image/jpeg', 1.0), 'JPEG', 0, 0, 210, 297);
      }

      if (mode === 'all') pdf.addPage();

      if (mode === 'page2' || mode === 'all') {
        const canvas2 = await html2canvas(p2, { scale: 2, useCORS: true });
        if (mode === 'page2') {
           pdf.addImage(canvas2.toDataURL('image/jpeg', 1.0), 'JPEG', 0, 0, 210, 297);
        } else {
           pdf.addImage(canvas2.toDataURL('image/jpeg', 1.0), 'JPEG', 0, 0, 210, 297);
        }
      }
      pdf.save(mode === 'all' ? '風一族週報_完整版.pdf' : `風一族週報_${mode}.pdf`);
    } catch (err) {
      showToast('匯出 PDF 失敗：' + err.message);
    }
    setIsExporting(false);
  };

  // ✅ 新增：上傳 PDF 至 Firebase Storage 供前台下載
  const publishPDFToCloud = async () => {
    setIsExporting(true);
    showToast('正在產生並上傳 PDF，請勿關閉視窗...');
    try {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');
      
      const p1 = document.getElementById('page-1');
      const p2 = document.getElementById('page-2');
      const canvas1 = await html2canvas(p1, { scale: 2, useCORS: true });
      const canvas2 = await html2canvas(p2, { scale: 2, useCORS: true });
      
      pdf.addImage(canvas1.toDataURL('image/jpeg', 1.0), 'JPEG', 0, 0, 210, 297);
      pdf.addPage();
      pdf.addImage(canvas2.toDataURL('image/jpeg', 1.0), 'JPEG', 0, 0, 210, 297);
      
      const pdfBlob = pdf.output('blob');
      const storageRef = storage.ref();
      const fileName = `bulletins/風一族週報_${data.bulletinDate}.pdf`;
      const fileRef = storageRef.child(fileName);
      
      // 上傳至 Firebase Storage
      await fileRef.put(pdfBlob);
      // 取得公開下載網址
      const downloadUrl = await fileRef.getDownloadURL();
      
      // 將網址存回資料庫，供前台讀取
      const nextData = { ...data, pdfDownloadUrl: downloadUrl };
      setData(nextData);
      await db.ref('bulletin_data').set(nextData);
      
      showToast('✅ PDF 已成功發佈至前台！');
    } catch (err) {
      console.error(err);
      showToast('❌ 發佈失敗：' + err.message + ' (請確認 Storage 規則有開啟)');
    }
    setIsExporting(false);
  };

  const navItems = [
    {id:'basic',label:'基本資訊'}, 
    {id:'theme',label:'主題信息'}, 
    {id:'sermon',label:'信息大綱'},
    {id:'songs',label:'敬拜詩歌'}, 
    {id:'schedule',label:'聚會流程'}, 
    {id:'announcements',label:'教會公告'},
    {id:'groups',label:'小組資訊'},
    {id:'contact',label:'聯絡奉獻'}
  ];

  const renderSection = () => {
    if (!data) return <div style={{padding:'20px'}}>連線中...</div>;
    
    switch(activeSection) {
      case 'basic': return (
        <Card>
          <SectionTitle>基本資訊</SectionTitle>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', alignItems:'end'}}>
            <Field label="週報日期"><input type="date" value={data.bulletinDate} onChange={e=>update('bulletinDate', e.target.value)}/></Field>
            <div style={{display:'flex', gap:'8px', marginBottom:'14px'}}>
              <div style={{flex:1}}><label>第幾週</label><input value={data.weekNumber} onChange={e=>update('weekNumber', e.target.value)}/></div>
              <Btn onClick={calculateWeekNumber} style={{height:'42px'}}>自動換算</Btn>
            </div>
          </div>
          <Field label="年度異象"><input value={data.vision} onChange={e=>update('vision', e.target.value)}/></Field>
        </Card>
      );

      case 'sermon': return (
        <div>
          <div style={{display:'flex', justifyContent:'space-between', marginBottom:'10px'}}>
            <span style={{color:'#4ade80', fontSize:'12px'}}>支援自定義標號，輸入空白可自動縮排。</span>
            <Btn size="sm" variant="primary" onClick={()=>{
              const n = [...data.sermonOutline, {title:'', content:[]}];
              update('sermonOutline', n);
            }}>+ 新增段落</Btn>
          </div>
          {data.sermonOutline.map((item, idx)=>(
            <Card key={idx}>
              <div style={{display:'flex', justifyContent:'space-between', marginBottom:'10px'}}>
                <div style={{display:'flex', alignItems:'center'}}>
                  <span style={{color:'#4ade80', fontWeight:'bold', marginRight:'10px'}}>段落 {idx+1}</span>
                  <SortControls isFirst={idx===0} isLast={idx===data.sermonOutline.length-1} onMoveUp={()=>moveItem('sermonOutline', idx, idx-1)} onMoveDown={()=>moveItem('sermonOutline', idx, idx+1)} />
                </div>
                <Btn size="sm" variant="danger" onClick={()=>{
                  const n = data.sermonOutline.filter((_,i)=>i!==idx);
                  update('sermonOutline', n);
                }}>刪除</Btn>
              </div>
              <Field label="段落標題"><input value={item.title} onChange={e=>{
                const n = [...data.sermonOutline]; n[idx].title = e.target.value; update('sermonOutline', n);
              }}/></Field>
              <label>內容要點排序 (可直接輸入 1. 或 •)</label>
              {item.content.map((c, ci)=>(
                <div key={ci} style={{display:'flex', gap:'8px', marginBottom:'6px', alignItems:'center'}}>
                  <div style={{fontSize:'12px', color:'#4ade80', width:'20px'}}>{ci+1}.</div>
                  <div style={{flex:1, position:'relative'}}>
                    <textarea value={c} onChange={e=>{
                      const n = [...data.sermonOutline]; n[idx].content[ci] = e.target.value; update('sermonOutline', n);
                    }}/>
                  </div>
                  <SortControls isFirst={ci===0} isLast={ci===item.content.length-1} onMoveUp={()=>moveItem(`sermonOutline.${idx}.content`, ci, ci-1)} onMoveDown={()=>moveItem(`sermonOutline.${idx}.content`, ci, ci+1)} />
                  <Btn size="sm" variant="danger" onClick={()=>{
                    const n = [...data.sermonOutline]; n[idx].content.splice(ci,1); update('sermonOutline', n);
                  }}>✕</Btn>
                </div>
              ))}
              <Btn size="sm" onClick={()=>{
                const n = [...data.sermonOutline]; n[idx].content.push(''); update('sermonOutline', n);
              }}>+ 新增要點</Btn>
            </Card>
          ))}
        </div>
      );

      case 'songs': return (
        <Card>
          <SectionTitle>敬拜詩歌 (空間固定，總數請保持 3~4 首)</SectionTitle>
          {['worship', 'response'].map(type => (
            <div key={type} style={{marginBottom:'20px'}}>
              <label>{type === 'worship' ? '1. 敬拜歌曲' : '2. 回應詩歌'}</label>
              {data.songs[type].map((s, i)=>(
                <div key={i} className="list-item-row">
                  <span style={{color:'#4ade80', marginRight:'10px', fontWeight:'bold'}}>{i+1}.</span>
                  <input value={s} style={{flex:1}} onChange={e=>{
                    const n = [...data.songs[type]]; n[i] = e.target.value; update(`songs.${type}`, n);
                  }}/>
                  <SortControls isFirst={i===0} isLast={i===data.songs[type].length-1} onMoveUp={()=>moveItem(`songs.${type}`, i, i-1)} onMoveDown={()=>moveItem(`songs.${type}`, i, i+1)} />
                  <Btn size="sm" variant="danger" style={{marginLeft:'8px'}} onClick={()=>{
                    const n = data.songs[type].filter((_,idx)=>idx!==i); update(`songs.${type}`, n);
                  }}>✕</Btn>
                </div>
              ))}
              <Btn size="sm" variant="primary" onClick={()=>{
                const n = [...data.songs[type], '']; update(`songs.${type}`, n);
              }}>+ 新增詩歌</Btn>
            </div>
          ))}
        </Card>
      );

      case 'schedule': return (
        <Card>
          <SectionTitle>聚會流程排序 (建議控制在 5 個流程內)</SectionTitle>
          {data.schedule.map((item, idx)=>(
            <div key={idx} className="list-item-row" style={{display:'grid', gridTemplateColumns:'30px 100px 100px 1fr auto', gap:'8px'}}>
              <div style={{color:'#4ade80', fontWeight:'bold'}}>{idx+1}</div>
              <input type="time" value={item.start} onChange={e=>{
                const n = [...data.schedule]; n[idx].start = e.target.value; update('schedule', n);
              }}/>
              <input type="time" value={item.end} onChange={e=>{
                const n = [...data.schedule]; n[idx].end = e.target.value; update('schedule', n);
              }}/>
              <input value={item.task} onChange={e=>{
                const n = [...data.schedule]; n[idx].task = e.target.value; update('schedule', n);
              }}/>
              <div style={{display:'flex', alignItems:'center'}}>
                <SortControls isFirst={idx===0} isLast={idx===data.schedule.length-1} onMoveUp={()=>moveItem('schedule', idx, idx-1)} onMoveDown={()=>moveItem('schedule', idx, idx+1)} />
                <Btn size="sm" variant="danger" style={{marginLeft:'8px'}} onClick={()=>{
                   const n = data.schedule.filter((_,i)=>i!==idx); update('schedule', n);
                }}>✕</Btn>
              </div>
            </div>
          ))}
          <Btn size="sm" variant="primary" onClick={()=>{
            const n = [...data.schedule, {start:'', end:'', task:''}]; update('schedule', n);
          }}>+ 新增流程</Btn>
        </Card>
      );

      case 'groups': {
        const currentList = groupTab === 'overseas' ? (data.overseas || []) : (data.groups?.[groupTab] || []);
        const currentPath = groupTab === 'overseas' ? 'overseas' : `groups.${groupTab}`;

        return (
          <div>
            <div style={{background:'#0a0a0a', padding:'4px', borderRadius:'8px', display:'flex', gap:'4px', marginBottom:'16px', border:'1px solid #222'}}>
              {['weekday','sunday','special','overseas'].map(t => (
                <button key={t} onClick={()=>setGroupTab(t)} style={{
                  flex:1, padding:'8px', border:'none', borderRadius:'6px', cursor:'pointer',
                  background: groupTab===t ? '#1e1e1e' : 'transparent',
                  color: groupTab===t ? '#4ade80' : '#666', fontSize:'13px'
                }}>{t==='weekday'?'平日':t==='sunday'?'主日':t==='special'?'特色與外縣市':'海外'}</button>
              ))}
            </div>
            <div style={{display:'flex', justifyContent:'flex-end', marginBottom:'10px'}}>
              <Btn size="sm" variant="primary" onClick={()=>{
                const newItem = groupTab === 'overseas' 
                  ? {name:'', leader:'', time:'', loc:'', flag:'🇬🇧'} 
                  : {category:'特色', name:'', time:'', leader:'', loc:'請洽小組長'};
                update(currentPath, [...currentList, newItem]);
              }}>+ 新增</Btn>
            </div>
            {currentList.map((g, idx)=>(
              <Card key={idx}>
                <div style={{display:'flex', justifyContent:'space-between', marginBottom:'10px'}}>
                  <div style={{display:'flex', alignItems:'center'}}>
                    <span style={{fontSize:'12px', color:'#888', marginRight:'10px'}}># {idx+1} 排序</span>
                    <SortControls 
                      isFirst={idx===0} 
                      isLast={idx===currentList.length-1} 
                      onMoveUp={()=>moveItem(currentPath, idx, idx-1)} 
                      onMoveDown={()=>moveItem(currentPath, idx, idx+1)} 
                    />
                  </div>
                  <Btn size="sm" variant="danger" onClick={()=>{
                    const newList = currentList.filter((_,i)=>i!==idx);
                    update(currentPath, newList);
                  }}>刪除</Btn>
                </div>
                
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px'}}>
                  {groupTab === 'special' && (
                    <Field label="所屬分類">
                      <select value={g.category || '特色'} onChange={e=>{
                         const newList = [...currentList];
                         newList[idx] = {...newList[idx], category: e.target.value};
                         update(currentPath, newList);
                      }}>
                        <option value="特色">特色團契 / 課程</option>
                        <option value="讀經">讀經小組</option>
                        <option value="外縣市">外縣市小組</option>
                      </select>
                    </Field>
                  )}
                  <Field label="小組名稱"><input value={g.name || ''} onChange={e=>{
                     const newList = [...currentList];
                     newList[idx] = {...newList[idx], name: e.target.value};
                     update(currentPath, newList);
                  }}/></Field>
                  <Field label="帶領人 / 牧師"><input value={g.leader || ''} onChange={e=>{
                     const newList = [...currentList];
                     newList[idx] = {...newList[idx], leader: e.target.value};
                     update(currentPath, newList);
                  }}/></Field>
                  <Field label="時間"><input value={g.time || ''} onChange={e=>{
                     const newList = [...currentList];
                     newList[idx] = {...newList[idx], time: e.target.value};
                     update(currentPath, newList);
                  }}/></Field>
                  <Field label="地點">
                    {groupTab === 'weekday' || groupTab === 'sunday' ? (
                      <select value={g.loc || '請洽小組長'} onChange={e=>{
                         const newList = [...currentList];
                         newList[idx] = {...newList[idx], loc: e.target.value};
                         update(currentPath, newList);
                      }}>
                        <option value="馬可樓">馬可樓</option>
                        <option value="北科大">北科大</option>
                        <option value="請洽小組長">請洽小組長</option>
                      </select>
                    ) : (
                      <>
                        <input 
                          list={`loc-options-${idx}`} 
                          placeholder="可自行輸入或選擇"
                          value={g.loc || ''} 
                          onChange={e=>{
                           const newList = [...currentList];
                           newList[idx] = {...newList[idx], loc: e.target.value};
                           update(currentPath, newList);
                          }}
                        />
                        <datalist id={`loc-options-${idx}`}>
                          <option value="馬可樓" />
                          <option value="北科大" />
                          <option value="請洽小組長" />
                        </datalist>
                      </>
                    )}
                  </Field>
                  {groupTab === 'overseas' && (
                    <Field label="國旗 (Emoji)"><input value={g.flag || ''} placeholder="例如: 🇬🇧" onChange={e=>{
                       const newList = [...currentList];
                       newList[idx] = {...newList[idx], flag: e.target.value};
                       update(currentPath, newList);
                    }}/></Field>
                  )}
                </div>
              </Card>
            ))}
          </div>
        );
      }   

      case 'announcements': return (
        <div>
          <div style={{display:'flex', justifyContent:'space-between', marginBottom:'10px'}}>
            <span style={{color:'#ef4444', fontSize:'12px', fontWeight:'bold'}}>⚠️ 建議公告維持 4~5 則，每則內容不超過 100 字。</span>
            <Btn size="sm" variant="primary" onClick={()=>{
              const n = [...data.announcements, {id: Date.now(), title:'', date:'', detail:''}];
              update('announcements', n);
            }}>+ 新增公告</Btn>
          </div>
          {data.announcements.map((a, idx)=>(
            <Card key={a.id}>
              <div style={{display:'flex', justifyContent:'space-between', marginBottom:'10px'}}>
                <div style={{display:'flex', alignItems:'center'}}>
                  <span style={{fontSize:'12px', color:'#888', marginRight:'10px'}}>公告順序 # {idx+1}</span>
                  <SortControls isFirst={idx===0} isLast={idx===data.announcements.length-1} onMoveUp={()=>moveItem('announcements', idx, idx-1)} onMoveDown={()=>moveItem('announcements', idx, idx+1)} />
                </div>
                <Btn size="sm" variant="danger" onClick={()=>{
                  const n = data.announcements.filter((_,i)=>i!==idx);
                  update('announcements', n);
                }}>刪除</Btn>
              </div>
              <div style={{display:'grid', gridTemplateColumns:'120px 1fr', gap:'12px'}}>
                <Field label="日期標籤"><input value={a.date} onChange={e=>{
                  const n = [...data.announcements]; n[idx].date = e.target.value; update('announcements', n);
                }}/></Field>
                <Field label="標題"><input value={a.title} onChange={e=>{
                  const n = [...data.announcements]; n[idx].title = e.target.value; update('announcements', n);
                }}/></Field>
              </div>
              <Field label="詳細內容 (支援換行做為列點)">
                <div style={{position:'relative'}}>
                  <textarea value={a.detail} onChange={e=>{
                     const n = [...data.announcements]; n[idx].detail = e.target.value; update('announcements', n);
                  }}/>
                  <span className={`word-count ${a.detail.length > 100 ? 'warning' : ''}`}>{a.detail.length} / 100 字</span>
                </div>
              </Field>
            </Card>
          ))}
        </div>
      );

      case 'theme': return (
        <Card>
          <SectionTitle>信息主題</SectionTitle>
          <Field label="標題"><input value={data.theme.title} onChange={e=>update('theme.title', e.target.value)}/></Field>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px'}}>
            <Field label="講員"><input value={data.theme.speaker} onChange={e=>update('theme.speaker', e.target.value)}/></Field>
            <Field label="司會"><input value={data.theme.moderator} onChange={e=>update('theme.moderator', e.target.value)}/></Field>
          </div>
          <Field label="本週經文"><textarea value={data.theme.scripture} onChange={e=>update('theme.scripture', e.target.value)}/></Field>
        </Card>
      );

      case 'contact': return (
        <div>
          <Card><SectionTitle>奉獻資訊</SectionTitle>
            <Field label="戶名"><input value={data.offering.name} onChange={e=>update('offering.name', e.target.value)}/></Field>
            <Field label="銀行"><input value={data.offering.bank} onChange={e=>update('offering.bank', e.target.value)}/></Field>
            <Field label="帳號"><input value={data.offering.account} onChange={e=>update('offering.account', e.target.value)}/></Field>
          </Card>
          <Card><SectionTitle>辦公室</SectionTitle>
            <Field label="電話"><input value={data.office.phone} onChange={e=>update('office.phone', e.target.value)}/></Field>
            <Field label="地址"><input value={data.office.address} onChange={e=>update('office.address', e.target.value)}/></Field>
          </Card>
        </div>
      );
      
      case 'preview': return (
        <div>
           {/* 大綱長篇模式切換功能 */}
           <div className="no-print" style={{ background: '#0a0a0a', border: '1px solid #333', padding: '12px 16px', borderRadius: '8px', marginBottom: '15px' }}>
              <label style={{ display: 'inline-flex', alignItems: 'center', gap: '8px', cursor: 'pointer', color: '#4ade80', fontSize: '14px', fontWeight: 'bold' }}>
                  <input 
                      type="checkbox" 
                      checked={data.layout?.longOutline || false} 
                      onChange={e => update('layout.longOutline', e.target.checked)} 
                      style={{ width: '18px', height: '18px', margin: 0, cursor: 'pointer' }}
                  />
                  啟用「長篇大綱模式」(當大綱字數過多時，可將流程移至右下角與詩歌並排)
              </label>
           </div>

           {/* 動態警告橫幅 */}
           <div className="no-print" style={{ 
             display: 'flex', justifyContent: 'space-between', marginBottom: '20px', alignItems: 'center', 
             background: isOverflowing ? '#fee2e2' : '#f0fdf4', 
             padding: '12px 16px', borderRadius: '8px', 
             border: `1px solid ${isOverflowing ? '#ef4444' : '#4ade80'}` 
           }}>
             <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
               {isOverflowing ? (
                 <span style={{ color: '#b91c1c', fontSize:'14px', fontWeight: 'bold' }}>
                   🚨 警告：文字過多已超出卡片！請刪減字數，或勾選上方的「長篇大綱模式」。
                 </span>
               ) : (
                 <span style={{ color: '#166534', fontSize:'14px', fontWeight: 'bold' }}>
                   ✅ 版面狀態良好，資訊已完整呈現於 A4 範圍內。
                 </span>
               )}
             </div>
           </div>
           
           {/* 匯出與發佈工具列 */}
           <div className="no-print" style={{ background: '#161616', padding: '15px', borderRadius: '8px', border: '1px solid #333', marginBottom: '20px', display: 'flex', flexWrap: 'wrap', gap: '10px', alignItems: 'center' }}>
             <span style={{color: '#aaa', fontSize: '13px', marginRight: '10px'}}>📥 電腦端快速下載：</span>
             
             <Btn size="sm" onClick={() => exportToImage('page-1', 'png')} disabled={isExporting}>P1 (PNG)</Btn>
             <Btn size="sm" onClick={() => exportToImage('page-1', 'jpeg')} disabled={isExporting}>P1 (JPEG)</Btn>
             <Btn size="sm" onClick={() => exportToPDF('page1')} disabled={isExporting}>P1 (PDF)</Btn>
             
             <span style={{width: '1px', height: '24px', background: '#333', margin: '0 5px'}}></span>
             
             <Btn size="sm" onClick={() => exportToImage('page-2', 'png')} disabled={isExporting}>P2 (PNG)</Btn>
             <Btn size="sm" onClick={() => exportToImage('page-2', 'jpeg')} disabled={isExporting}>P2 (JPEG)</Btn>
             <Btn size="sm" onClick={() => exportToPDF('page2')} disabled={isExporting}>P2 (PDF)</Btn>
             
             <span style={{flex: 1}}></span>
             
             {/* 發佈 PDF 至雲端供前台使用 */}
             <Btn variant="primary" style={{ background: '#3b82f6', borderColor: '#3b82f6', color: '#fff' }} onClick={publishPDFToCloud} disabled={isExporting}>
               {isExporting ? '處理中...' : '☁️ 產生 PDF 並發佈至前台'}
             </Btn>
             
             <Btn variant={isOverflowing ? 'danger' : 'default'} onClick={() => exportToPDF('all')} disabled={isExporting}>
               🖨️ 下載完整雙面 PDF
             </Btn>
           </div>
           
           <BulletinPreview data={data} outlineRef={outlineRef} announcementsRef={announcementsRef} />
        </div>
      );

      default: return null;
    }
  };

  return (
    <div style={{display:'flex', flexDirection:'column', minHeight:'100vh'}}>
      
      {/* 修改 Header 結構 */}
      <div className="no-print" style={{background:'#111', borderBottom:'1px solid #1e1e1e', padding:'14px 24px', display:'flex', alignItems:'center', justifyContent:'space-between', position:'sticky', top:0, zIndex:100}}>
        <div style={{display:'flex', alignItems:'center', gap:'12px'}}>
          <div style={{width:'32px', height:'32px', background:'#4ade80', borderRadius:'8px', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'16px', color:'#000'}}>✦</div>
          <div style={{display:'flex', flexDirection:'column'}}>
            <div style={{fontSize:'16px', fontWeight:'700'}}>風一族週報後台 v2.7</div>
            <div style={{fontSize:'11px', color: isConnected ? '#4ade80' : '#888'}}>
                {isConnected ? '● 已連線雲端' : '○ 載入中...'}
            </div>
          </div>
        </div>
        
        {/* 新版按鈕區：儲存左，預覽右 */}
        <div style={{display:'flex', alignItems:'center', gap:'12px'}}>
          <Btn variant="default" onClick={save} disabled={isSaving || !isConnected}>
              {isSaving ? '更新中...' : '💾 更新資訊'}
          </Btn>
          <Btn 
              variant={activeSection === 'preview' ? 'primary' : 'default'} 
              onClick={() => setActiveSection('preview')} 
              style={{
                  backgroundColor: activeSection === 'preview' ? '#4ade80' : 'transparent',
                  color: activeSection === 'preview' ? '#0f0f0f' : '#ccc',
                  borderColor: activeSection === 'preview' ? '#4ade80' : '#2e2e2e'
              }}
          >
              📄 預覽與列印
          </Btn>
        </div>
      </div>

      <div style={{display:'flex', flex:1}}>
        
        {/* 固定側邊欄 */}
        <div className="no-print sidebar-fixed">
          {navItems.map(item=>(
            <button key={item.id} onClick={()=>setActiveSection(item.id)} style={{
              width:'100%', textAlign:'left', padding:'10px 12px', borderRadius:'7px', border:'none',
              background: activeSection===item.id ? '#1e1e1e' : 'transparent',
              color: activeSection===item.id ? '#4ade80' : '#888',
              fontSize:'13px', cursor:'pointer', marginBottom:'4px', display:'block'
            }}>{item.label}</button>
          ))}
          <div style={{marginTop:'30px', padding:'10px', borderTop:'1px solid #222'}}>
             <Btn size="sm" style={{width:'100%'}} onClick={()=>navigator.clipboard.writeText(JSON.stringify(data)).then(()=>showToast('JSON 已複製'))}>複製全域資料</Btn>
          </div>
        </div>

        <div style={{flex:1, padding:'30px', overflowY:'auto', background:'#0f0f0f'}}>
          <div style={{maxWidth:'800px', margin:'0 auto'}}>{renderSection()}</div>
        </div>
      </div>
      {toast && <div style={{position:'fixed', bottom:'20px', right:'20px', background:'#0f2d1a', border:'1px solid #4ade80', color:'#4ade80', padding:'10px 20px', borderRadius:'8px', zIndex:1000, boxShadow:'0 4px 12px rgba(0,0,0,0.5)'}}>{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
